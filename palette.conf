# ============================================================
# Manga Mono — Color Palette
# Edit these values then run: ./apply-theme.sh
# ============================================================

# --- Dark mode (default) ---
CANVAS="#0d1117"        # main background
SURFACE="#161b22"       # panels / cards
RAISED="#1c2128"        # elevated / selection bg
LINE="#30363d"          # borders
TONE="#6e7681"          # muted text
SOFT="#b9c1cb"          # secondary text
TEXT="#e8eaed"          # primary text
BLUE="#4a9eff"          # sole accent (cursor, links, action)
BLUE_MID="#2d6fc4"      # mid blue (gradients)
BLUE_BRIGHT="#74b4ff"   # bright blue
BLUE_LIGHT="#6fb3d6"    # ANSI cyan slot
BLUE_SEL="#8cc0e8"      # starship light-block directory
BRICK="#bf6a5e"         # errors
BRICK_BRIGHT="#d0746e"  # bright errors

# --- Neovim syntax tiers (independent of ANSI slots) ---
NVIM_TYPES="#c4cdd6"    # types/classes — brighter than line numbers
NVIM_STRINGS="#7da8be"  # strings — blue-tinted grey, distinct from types and grey
DARK_RAISED="#484f58"   # dark raised (ANSI bright-black)

# --- ANSI 16-color terminal palette ---
# Reorder to taste — ghostty and terminator both use this
ANSI_0="$CANVAS"        # black
ANSI_1="$BRICK"         # red
ANSI_2="#6e8b9e"        # green  → muted blue-grey
ANSI_3="#9aa3ad"        # yellow → warm grey
ANSI_4="$BLUE"          # blue
ANSI_5="#7c8aa0"        # magenta
ANSI_6="$BLUE_LIGHT"    # cyan
ANSI_7="$SOFT"          # white
ANSI_8="$DARK_RAISED"   # bright black
ANSI_9="$BRICK_BRIGHT"  # bright red
ANSI_10="#8fa6b5"       # bright green
ANSI_11="#c0c8d0"       # bright yellow
ANSI_12="$BLUE_BRIGHT"  # bright blue
ANSI_13="#9aa8bd"       # bright magenta
ANSI_14="#9cd0ec"       # bright cyan
ANSI_15="$TEXT"         # bright white

# --- Light / paper mode ---
LIGHT_CANVAS="#f4f2ec"
LIGHT_SURFACE="#ede9df"
LIGHT_RAISED="#e2dfd5"
LIGHT_LINE="#c8c4b8"
LIGHT_TONE="#8a8578"
LIGHT_TEXT="#14171a"
LIGHT_BLUE="#1f5fa8"

# --- Misc ---
WALLPAPER_PATH=""       # optional: absolute path to bg image for terminator/ghostty
FONT_FAMILY="CaskaydiaCove Nerd Font Mono"
FONT_SIZE="12"
